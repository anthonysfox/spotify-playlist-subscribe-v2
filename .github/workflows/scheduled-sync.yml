name: Scheduled Playlist Sync

on:
  # Run daily at midnight UTC
  schedule:
    - cron: '0 0 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync-playlists:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Playlist Sync
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -o response.json

          echo "Response:"
          cat response.json

      - name: Check sync status
        run: |
          if [ -f response.json ]; then
            success=$(cat response.json | grep -o '"success"[[:space:]]*:[[:space:]]*true' || echo "")
            if [ -z "$success" ]; then
              echo "Sync failed or returned unexpected response"
              exit 1
            fi
            echo "Sync completed successfully"
          fi
