name: Scheduled Playlist Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: scheduled-playlist-sync
  cancel-in-progress: false

jobs:
  sync-playlists:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Playlist Sync
        run: |
          curl --fail-with-body -X GET "${{ secrets.APP_URL }}/api/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -o response.json
          echo "Response:"
          cat response.json

      - name: Check sync status
        run: |
          jq .
          if [ "$(jq -r '.success' response.json)" != "true" ]; then
            echo "Sync failed: $(jq -r '.error // .message // "unknown error"' response.json)"
            exit 1
          fi
          echo "Sync completed successfully"
